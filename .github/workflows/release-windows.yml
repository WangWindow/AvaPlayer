name: Release Windows Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to create/update. Leave empty to only upload workflow artifacts."
        required: false
        type: string
      runtime_release_tag:
        description: "GitHub release tag that hosts the win-x64 libmpv runtime bundle."
        required: false
        default: "v1.0.0"
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      RID: win-x64
      LIBMPV_RUNTIME_RELEASE_TAG: v1.0.0
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Determine build metadata
        id: meta
        shell: pwsh
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_RUNTIME_RELEASE_TAG: ${{ inputs.runtime_release_tag }}
        run: |
          [xml]$projectXml = Get-Content -LiteralPath "AvaPlayer.csproj"
          $version = ($projectXml.Project.PropertyGroup | Where-Object { $_.AssemblyVersion } | Select-Object -First 1).AssemblyVersion
          if (-not $version) {
              $version = "1.0.0"
          }

          $releaseTag = $env:INPUT_RELEASE_TAG
          if ($env:GITHUB_REF_TYPE -eq "tag") {
              $releaseTag = $env:GITHUB_REF_NAME
          }

          $runtimeReleaseTag = $env:INPUT_RUNTIME_RELEASE_TAG
          if (-not $runtimeReleaseTag) {
              $runtimeReleaseTag = $env:LIBMPV_RUNTIME_RELEASE_TAG
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "runtime_release_tag=$runtimeReleaseTag" >> $env:GITHUB_OUTPUT
          "artifact_dir=artifacts/package/$env:RID/$version" >> $env:GITHUB_OUTPUT

      - name: Install Windows packaging dependencies
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          dotnet tool install --global wix

          $toolPath = "$env:USERPROFILE\.dotnet\tools"
          $env:PATH = "$toolPath;$env:PATH"
          $toolPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          $innoDirs = @(
              (Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6"),
              (Join-Path $env:ProgramFiles "Inno Setup 6"),
              (Join-Path ${env:ProgramFiles(x86)} "Inno Setup 5"),
              (Join-Path $env:ProgramFiles "Inno Setup 5")
          ) | Where-Object { Test-Path -LiteralPath $_ }

          foreach ($innoDir in $innoDirs) {
              $env:PATH = "$innoDir;$env:PATH"
              $innoDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

          if (-not (Get-Command "ISCC.exe" -ErrorAction SilentlyContinue)) {
              throw "ISCC.exe was not found after installing Inno Setup."
          }

          if (-not (Get-Command "wix" -ErrorAction SilentlyContinue)) {
              throw "wix CLI was not found after installation."
          }

      - name: Download win-x64 libmpv bundle
        shell: pwsh
        env:
          RUNTIME_RELEASE_TAG: ${{ steps.meta.outputs.runtime_release_tag }}
        run: |
          if (Test-Path -LiteralPath "runtimes/win-x64") {
              Remove-Item -LiteralPath "runtimes/win-x64" -Recurse -Force
          }

          New-Item -ItemType Directory -Path "runtimes" -Force | Out-Null
          $runtimeUrl = "https://github.com/WangWindow/AvaPlayer/releases/download/$env:RUNTIME_RELEASE_TAG/win-x64.zip"
          Invoke-WebRequest -Uri $runtimeUrl -OutFile "$env:RUNNER_TEMP/win-x64.zip"
          Expand-Archive -LiteralPath "$env:RUNNER_TEMP/win-x64.zip" -DestinationPath "runtimes" -Force

          if (-not (Test-Path -LiteralPath "runtimes/win-x64/native/libmpv-2.dll")) {
              throw "libmpv runtime bundle was not extracted to runtimes/win-x64/native/libmpv-2.dll"
          }

      - name: Package Windows artifacts
        shell: pwsh
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          .\scripts\package-windows.ps1 -Configuration Release -Rid $env:RID -Version $env:VERSION

      - name: Generate checksums
        shell: pwsh
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          ARTIFACT_DIR: ${{ steps.meta.outputs.artifact_dir }}
        run: |
          $artifactDir = $env:ARTIFACT_DIR
          $files = @(
              "AvaPlayer-$env:VERSION-win-x64.zip",
              "AvaPlayer-$env:VERSION-win-x64-setup.exe",
              "AvaPlayer-$env:VERSION-win-x64.msi"
          )

          $lines = foreach ($file in $files) {
              $fullPath = Join-Path $artifactDir $file
              $hash = (Get-FileHash -LiteralPath $fullPath -Algorithm SHA256).Hash.ToLowerInvariant()
              "$hash *$file"
          }

          $lines | Set-Content -LiteralPath (Join-Path $artifactDir "SHA256SUMS.txt") -Encoding ascii
          Get-ChildItem -LiteralPath $artifactDir

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: avaplayer-win-x64-${{ steps.meta.outputs.version }}
          path: |
            ${{ steps.meta.outputs.artifact_dir }}/AvaPlayer-${{ steps.meta.outputs.version }}-win-x64.zip
            ${{ steps.meta.outputs.artifact_dir }}/AvaPlayer-${{ steps.meta.outputs.version }}-win-x64-setup.exe
            ${{ steps.meta.outputs.artifact_dir }}/AvaPlayer-${{ steps.meta.outputs.version }}-win-x64.msi
            ${{ steps.meta.outputs.artifact_dir }}/SHA256SUMS.txt

      - name: Publish GitHub release assets
        if: steps.meta.outputs.release_tag != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          ARTIFACT_DIR: ${{ steps.meta.outputs.artifact_dir }}
        run: |
          $releaseTag = $env:RELEASE_TAG
          $artifactDir = $env:ARTIFACT_DIR
          $files = @(
              (Resolve-Path -LiteralPath (Join-Path $artifactDir "AvaPlayer-$env:VERSION-win-x64.zip")).Path,
              (Resolve-Path -LiteralPath (Join-Path $artifactDir "AvaPlayer-$env:VERSION-win-x64-setup.exe")).Path,
              (Resolve-Path -LiteralPath (Join-Path $artifactDir "AvaPlayer-$env:VERSION-win-x64.msi")).Path,
              (Resolve-Path -LiteralPath (Join-Path $artifactDir "SHA256SUMS.txt")).Path
          )

          & gh release view $releaseTag *> $null
          if ($LASTEXITCODE -ne 0) {
              & gh release create $releaseTag `
                  --target $env:GITHUB_SHA `
                  --title $releaseTag `
                  --notes "Automated Windows release for AvaPlayer."
          }

          & gh release upload $releaseTag @files --clobber
